version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: spirit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spirit
    ports:
      - '5432:5432'
    volumes:
      - spirit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spirit Relay Server ───────────────────────────────────────────────────────
  relay:
    build:
      context: .
      dockerfile: apps/relay/Dockerfile
    container_name: spirit_relay
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spirit
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-random-secret-please}
      JWT_EXPIRY: 1h
      REFRESH_TOKEN_EXPIRY: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NONCE_EXPIRY: 300
      SESSION_DURATION: 86400
      RATE_LIMIT_MAX: 60
      RATE_LIMIT_WINDOW: 60000
    depends_on:
      postgres:
        condition: service_healthy

  # ── Demo App (optional) ───────────────────────────────────────────────────────
  demo:
    build:
      context: .
      dockerfile: apps/demo/Dockerfile
    container_name: spirit_demo
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_RELAY_URL: http://relay:4000
    depends_on:
      - relay

volumes:
  spirit_pgdata:
